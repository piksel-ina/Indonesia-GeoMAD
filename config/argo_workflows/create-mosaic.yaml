apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: create-mosaic-parallel
  namespace: argo-workflows

spec:
  entrypoint: workflow-entrypoint
  serviceAccountName: argo-workflows-executor

  podGC:
    strategy: OnPodSuccess

  ttlStrategy:
    secondsAfterSuccess: 5000
    secondsAfterFailure: 5000

  artifactGC:
    strategy: OnWorkflowDeletion
    forceFinalizerRemoval: true

  nodeSelector:
    data-production: r8xlarge
  tolerations:
    - key: data-production
      operator: Equal
      value: r8xlarge
      effect: NoSchedule

  podMetadata:
    annotations:
      karpenter.sh/do-not-disrupt: "true"

  parallelism: 20

  arguments:
    parameters:
      - name: image-name # ?
        value: "686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/geomad:v20260722-1417"
      - name: version
        value: "1.0.0"
      - name: output-bucket
        value: piksel-staging-public-data
      # - name: output-path
      #   value: geomad_s2
      - name: years
      # As of 2026-07-20: 2020-2025 completed, 2019 processing, 2017-2018 not started.
      # And 2022-2025 have been indexed as ODC datasets.
        # value: '["2017","2018","2019","2020","2021","2022","2023","2024","2025"]'
        value: '["2025"]'
      - name: product
        value: s2_geomad_annual
      # TODO: needed? It is auto.
      # - name: out-product
      #   value: geomad_s2_annual_mosaic_120
      - name: period
        value: P1Y
      - name: bands
        value: '["red","green","blue","rededge1","rededge2","rededge3","nir","nir08","swir16","swir22","BCMAD","EMAD","SMAD","COUNT"]'
      - name: resolution
        value: "120"
      - name: overwrite
        value: "false"

  templates:
    - name: workflow-entrypoint
      dag:
        tasks:
          - name: generate-year-band-matrix
            template: year-band-matrix


          - name: create-band-cogs
            template: create-band-cog
            depends: "generate-year-band-matrix.Succeeded"
            arguments:
              parameters:
                - name: year
                  value: "{{item.year}}"
                - name: band
                  value: "{{item.band}}"
            withParam: "{{tasks.generate-year-band-matrix.outputs.result}}"


          - name: create-rgb-cogs
            template: create-rgb-cog
            depends: "create-band-cogs.Succeeded"
            arguments:
              parameters:
                - name: year
                  value: "{{item}}"
            withParam: "{{workflow.parameters.years}}"


          - name: write-stac-items
            template: create-stac-item
            # TODO: this waits for ALL years' band cogs before writing ANY year's STAC item,
            # since Argo doesn't have a cheap way to gate per-year without a nested DAG.
            # Fine while parallelism is capped and volumes are small; revisit if this becomes
            # a bottleneck (e.g. split into a per-year sub-DAG called via withParam).
            depends: "create-rgb-cogs.Succeeded"
            arguments:
              parameters:
                - name: year
                  value: "{{item}}"
            withParam: "{{workflow.parameters.years}}"


    - name: year-band-matrix
      script:
        image: python:3.12-slim
        command: [python]
        source: |
          import json
          years = json.loads('{{workflow.parameters.years}}')
          bands = json.loads('{{workflow.parameters.bands}}')
          matrix = [{"year": year, "band": band} for year in years for band in bands]
          print(json.dumps(matrix))


    - name: create-band-cog
      inputs:
        parameters:
          - name: year
          - name: band
      container:
        image: "{{workflow.parameters.image-name}}"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 30Gi
            cpu: 3
          limits:
            memory: 32Gi
            cpu: 4
        env: &odc-env
          - name: AWS_DEFAULT_REGION
            value: "ap-southeast-3"
          - name: DB_HOSTNAME
            value: "pg-proxy-service.database.svc.cluster.local"
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: odc
                key: password
          - name: DB_DATABASE
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_DEFAULT_DB_HOSTNAME
            value: "pg-proxy-service.database.svc.cluster.local"
          - name: ODC_DEFAULT_DB_PORT
            value: "6432"
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: odc
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            valueFrom:
              secretKeyRef:
                name: odc
                key: username # TODO: Fix username used as db name
        command: ["/entrypoint.sh"]
        args:
          - /bin/bash
          - "-c"
          - |
            set -ex
            python /app/src/low_res_mosaic/low_res_mosaic.py band \
              --product "{{workflow.parameters.product}}" \
              --version "{{workflow.parameters.version}}" \
              --time-start "{{inputs.parameters.year}}" \
              --period "{{workflow.parameters.period}}" \
              --band "{{inputs.parameters.band}}" \
              --resolution "{{workflow.parameters.resolution}}" \
              --s3-output-root "s3://{{workflow.parameters.output-bucket}}/" \
              $( [ "{{workflow.parameters.overwrite}}" = "true" ] && echo --overwrite )


    - name: create-rgb-cog
      inputs:
        parameters:
          - name: year
      container:
        image: "{{workflow.parameters.image-name}}"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 2Gi
            cpu: 1
          limits:
            memory: 4Gi
            cpu: 2
        env: *odc-env
        command: ["/entrypoint.sh"]
        args:
          - /bin/bash
          - "-c"
          - |
            set -ex
            python /app/src/low_res_mosaic/low_res_mosaic.py rgb \
              --product "{{workflow.parameters.product}}" \
              --version "{{workflow.parameters.version}}" \
              --time-start "{{inputs.parameters.year}}" \
              --period "{{workflow.parameters.period}}" \
              --resolution "{{workflow.parameters.resolution}}" \
              --s3-output-root "s3://{{workflow.parameters.output-bucket}}/" \
              $( [ "{{workflow.parameters.overwrite}}" = "true" ] && echo --overwrite )


    - name: create-stac-item
      inputs:
        parameters:
          - name: year
      container:
        image: "{{workflow.parameters.image-name}}"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 2Gi
            cpu: 1
          limits:
            memory: 4Gi
            cpu: 1

        env: *odc-env
        command: ["/entrypoint.sh"]
        args:
          - /bin/bash
          - "-c"
          - |
            set -ex
            python /app/src/low_res_mosaic/low_res_mosaic.py stac \
              --product "{{workflow.parameters.product}}" \
              --version "{{workflow.parameters.version}}" \
              --time-start "{{inputs.parameters.year}}" \
              --period "{{workflow.parameters.period}}" \
              --resolution "{{workflow.parameters.resolution}}" \
              --s3-output-root "s3://{{workflow.parameters.output-bucket}}/" \
              --bands '{{workflow.parameters.bands}}' \
              $( [ "{{workflow.parameters.overwrite}}" = "true" ] && echo --overwrite )
